<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagamento PIX</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="personalizar-container">

<div class="formulario">

<h2>Pagamento via PIX</h2>

<p>Escaneie o QR Code abaixo</p>

<img id="qrCode" style="width:260px;margin:20px auto;display:block;">

<textarea
id="codigoPix"
readonly
style="
width:100%;
height:120px;
resize:none;
padding:10px;
margin-top:20px;
"></textarea>

<button
id="copiarPix"
class="comprar">

COPIAR CÓDIGO PIX

</button>

<br><br>

<h3 id="valorPix"></h3>

<p style="color:#888">

Aguardando confirmação do pagamento...

</p>

</div>

</div>

<script>

document.getElementById("qrCode").src =
"data:image/png;base64," +
localStorage.getItem("qrBase64");

document.getElementById("codigoPix").value =
localStorage.getItem("qrCode");

document.getElementById("valorPix").innerText =
"Valor: " + localStorage.getItem("valorTotal");

document
.getElementById("copiarPix")
.addEventListener("click", () => {

navigator.clipboard.writeText(
document.getElementById("codigoPix").value
);

alert("Código PIX copiado!");

});

</script>

</body>
</html>
