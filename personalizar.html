<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personalizar Camisa</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="personalizar-container">

    <a href="index.html" class="voltar">← Voltar</a>

    <div class="camisa-card">

        <div class="camisa-misteriosa">
            ?
        </div>

        <h2>CAMISA PERSONALIZADA</h2>

        <h3>R$ 15,00</h3>

    </div>

    <div class="formulario">

        <label>Nome na camisa</label>
        <input type="text" id="nomeCamisa" placeholder="Ex: DG">
<p id="erroNome" class="erro"></p>
        <label>Número</label>
        <input type="number" id="numeroCamisa" placeholder="18">
<p id="erroNumero" class="erro"></p>
        <label>Frase</label>
       <input
    type="text"
    id="fraseCamisa"
    placeholder="Ex: Deus acima de tudo">

        <label>Personalização Extra</label>

<div id="areaPersonalizacao"></div>

<button
type="button"
id="abrirPersonalizacao"
class="extra-btn">

+ Adicionar Personalização (+R$2)

</button>

        <label>Cupom</label>
        <input type="text" placeholder="Digite seu cupom">

        <div class="total-box">

            <span>Total</span>

            <h1 id="valorTotal">R$ 15,00</h1>

        </div>

        <button id="finalizarPedido" class="comprar">
    FINALIZAR PEDIDO
</button>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
