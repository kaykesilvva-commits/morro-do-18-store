<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumo do Pedido</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="personalizar-container">

    <div class="formulario">

        <h2>Resumo do Pedido</h2>

        <div class="total-box">

            <p><strong>Nome:</strong> <span id="resumoNome"></span></p>

            <p><strong>Número:</strong> <span id="resumoNumero"></span></p>

            <p><strong>Frase:</strong> <span id="resumoFrase"></span></p>

            <p><strong>Personalização Extra:</strong> <span id="resumoExtra"></span></p>

            <h2 id="resumoTotal"></h2>

        </div>

        <div class="cupom-box">

            <h3>🎟 Cupom de desconto</h3>

            <div class="cupom-area">

                <input
                    type="text"
                    id="cupom"
                    placeholder="Digite seu cupom">

                <button
                    type="button"
                    id="aplicarCupom">

                    Aplicar

                </button>

            </div>

        </div>

        <h3>Forma de pagamento</h3>

        <div class="pagamentos">

            <label class="opcao-pagamento">
                <input type="radio" name="pagamento" value="pix" checked>
                <span>⚡ PIX</span>
            </label>

            
        </div>

        <div class="acoesCheckout">

            <a href="personalizar.html" class="voltarBtn">
                ← Voltar
            </a>

        </div>

        <br><br>

        <button class="comprar">
            CONTINUAR PARA PAGAMENTO
        </button>

    </div>

</div>

<script>
    document.getElementById("resumoNome").innerText =
localStorage.getItem("nomeCamisa");

document.getElementById("resumoNumero").innerText =
localStorage.getItem("numeroCamisa");

document.getElementById("resumoFrase").innerText =
localStorage.getItem("fraseCamisa");

document.getElementById("resumoExtra").innerText =
localStorage.getItem("extraCamisa");

document.getElementById("resumoTotal").innerText =
localStorage.getItem("valorTotal");

// =====================
// CUPOM
// =====================

const btnCupom = document.getElementById("aplicarCupom");

let cupomAplicado = false;

btnCupom.addEventListener("click", async () => {

    if (cupomAplicado) {
        alert("Este pedido já possui um cupom.");
        return;
    }

    const cupom = document.getElementById("cupom").value.trim();

    if (!cupom) {
        alert("Digite um cupom.");
        return;
    }

    const resposta = await fetch("/api/validar-cupom", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            codigo: cupom
        })
    });

    const dados = await resposta.json();

    if (!dados.valido) {
        alert("Cupom inválido.");
        return;
    }

    const valorOriginal = Number(
        localStorage.getItem("valorTotal")
            .replace("R$", "")
            .replace(",", ".")
            .trim()
    );

    let valorFinal;

    if (dados.valor_fixo && Number(dados.valor_fixo) > 0) {
        valorFinal = Number(dados.valor_fixo);
    } else {
        valorFinal =
            valorOriginal -
            (valorOriginal * Number(dados.desconto) / 100);
    }

    document.getElementById("resumoTotal").innerText =
        "R$ " + valorFinal.toFixed(2).replace(".", ",");

    localStorage.setItem(
        "valorTotal",
        "R$ " + valorFinal.toFixed(2).replace(".", ",")
    );

    cupomAplicado = true;
    btnCupom.disabled = true;
    document.getElementById("cupom").disabled = true;

    alert("Cupom aplicado com sucesso!");
});
// =====================
// BOTÃO WHATSAPP
// =====================

const btnComprar = document.querySelector(".comprar");

btnComprar.innerText = "ENVIAR PEDIDO PELO WHATSAPP";

btnComprar.addEventListener("click", () => {

    const nome = localStorage.getItem("nomeCamisa");
    const numero = localStorage.getItem("numeroCamisa");
    const frase = localStorage.getItem("fraseCamisa");
    const extra = localStorage.getItem("extraCamisa");
    const total = localStorage.getItem("valorTotal");

    const cupom = document.getElementById("cupom").value || "Nenhum";

    const mensagem =
`🛒 *NOVO PEDIDO - MORRO DO 18 STORE*

👕 *Nome:* ${nome}
🔢 *Número:* ${numero}
📝 *Frase:* ${frase}

🎨 *Personalização:*
${extra}

🎟 *Cupom:* ${cupom}

💰 *Valor:* ${total}

━━━━━━━━━━━━━━

⚡ *PAGAMENTO VIA PIX*

Chave PIX:
23135385752


Após realizar o pagamento, envie o comprovante nesta conversa.

⚠️ O pedido será produzido após a confirmação do pagamento.

    window.open(
        "https://wa.me/5521980648653?text=" +
        encodeURIComponent(mensagem),
        "_blank"
    );

});

</script>
</body>
</html>
